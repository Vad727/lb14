name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: SAST - Semgrep scan
        run: |
          pip install semgrep
          semgrep --config p/security-audit --json -o reports/semgrep.json . || true

      - name: SCA - Trivy scan
        run: |
          docker run --rm -v "$PWD:/project" aquasec/trivy fs --format cyclonedx --output /project/reports/sbom.json /project
          docker run --rm -v "$PWD:/project" aquasec/trivy fs --severity CRITICAL,HIGH --format json --output /project/reports/trivy.json /project || true

      - name: DAST - Start test web app
        run: |
          python lab13_dast/app.py &
          sleep 10

      - name: DAST - OWASP ZAP scan
        run: |
          docker run --rm --network host -v "$PWD/reports:/zap/wrk/:rw" ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://127.0.0.1:5000 -J zap_report.json -r zap_report.html || true

      - name: Security Gate
        run: |
          python scripts/security_gate.py

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: reports/
