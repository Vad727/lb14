name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Run Semgrep scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            semgrep/semgrep:latest \
            semgrep scan \
              --config ./semgrep-local.yml \
              --config p/python \
              --config p/security-audit \
              --json \
              --output reports/semgrep-report.json \
              . || true

      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-report
          path: reports/semgrep-report.json

  sca:
    name: SCA - Trivy and SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Generate SBOM
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            aquasec/trivy:latest \
            fs \
              --skip-dirs /src/reports \
              --format cyclonedx \
              --output /src/reports/sbom.json \
              /src

      - name: Run Trivy vulnerability scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            aquasec/trivy:latest \
            fs \
              --skip-dirs /src/reports \
              --severity CRITICAL,HIGH \
              --format json \
              --output /src/reports/trivy_report.json \
              /src || true

      - name: Upload SCA reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-reports
          path: |
            reports/sbom.json
            reports/trivy_report.json

  dast:
    name: DAST - Pytest audio input checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Prepare DAST reports directory
        run: mkdir -p lab13_dast/reports

      - name: Generate DAST test audio inputs
        run: |
          python lab13_dast/create_test_inputs.py

      - name: Run DAST pytest checks
        run: |
          set +e
          python -m pytest lab13_dast/test_dast_audio_inputs.py -v --tb=short | tee lab13_dast/reports/dast_pytest_report.txt
          pytest_status=${PIPESTATUS[0]}
          echo "$pytest_status" > lab13_dast/reports/dast_exit_code.txt
          exit 0

      - name: Upload DAST reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-reports
          path: |
            lab13_dast/reports/dast_pytest_report.txt
            lab13_dast/reports/dast_exit_code.txt

  security_gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, sca, dast]
    if: always()

    steps:
      - name: Download SAST report
        uses: actions/download-artifact@v4
        with:
          name: sast-report
          path: artifacts/sast

      - name: Download SCA reports
        uses: actions/download-artifact@v4
        with:
          name: sca-reports
          path: artifacts/sca

      - name: Download DAST reports
        uses: actions/download-artifact@v4
        with:
          name: dast-reports
          path: artifacts/dast

      - name: Run unified Security Gate
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re
          import sys

          SEVERITY_ORDER = {
              "INFO": 0,
              "LOW": 1,
              "MEDIUM": 2,
              "HIGH": 3,
              "CRITICAL": 4,
          }

          def load_json(path: str) -> dict:
              file_path = Path(path)
              if not file_path.exists():
                  print(f"[security-gate] FAILED: файл не найден: {file_path}")
                  sys.exit(1)

              with file_path.open("r", encoding="utf-8", errors="replace") as file:
                  return json.load(file)

          def read_text(path: str) -> str:
              file_path = Path(path)
              if not file_path.exists():
                  print(f"[security-gate] FAILED: файл не найден: {file_path}")
                  sys.exit(1)

              return file_path.read_text(encoding="utf-8", errors="replace")

          def read_exit_code(path: str) -> int:
              raw_value = read_text(path).strip()

              try:
                  return int(raw_value)
              except ValueError:
                  print(f"[security-gate] FAILED: некорректный exit code DAST: {raw_value}")
                  return 1

          semgrep = load_json("artifacts/sast/semgrep-report.json")
          trivy = load_json("artifacts/sca/trivy_report.json")
          dast_report = read_text("artifacts/dast/dast_pytest_report.txt")
          dast_exit_code = read_exit_code("artifacts/dast/dast_exit_code.txt")

          sast_errors = [
              result for result in semgrep.get("results", [])
              if result.get("extra", {}).get("severity") == "ERROR"
          ]

          sca_critical = []
          sca_high = []

          for result in trivy.get("Results", []):
              for vuln in result.get("Vulnerabilities") or []:
                  severity = vuln.get("Severity")

                  if severity == "CRITICAL":
                      sca_critical.append(vuln)

                  if severity == "HIGH":
                      sca_high.append(vuln)

          dast_markers = [
              marker.upper()
              for marker in re.findall(
                  r"DAST_SEVERITY\s*[:=]\s*(INFO|LOW|MEDIUM|HIGH|CRITICAL)",
                  dast_report,
                  flags=re.IGNORECASE,
              )
          ]

          dast_blocking_markers = [
              marker for marker in dast_markers
              if SEVERITY_ORDER[marker] >= SEVERITY_ORDER["HIGH"]
          ]

          print("[security-gate] Unified DevSecOps Security Gate")
          print(f"[security-gate] SAST ERROR findings: {len(sast_errors)}")
          print(f"[security-gate] SCA CRITICAL vulnerabilities: {len(sca_critical)}")
          print(f"[security-gate] SCA HIGH vulnerabilities: {len(sca_high)}")
          print(f"[security-gate] DAST pytest exit code: {dast_exit_code}")
          print(f"[security-gate] DAST HIGH/CRITICAL markers: {dast_blocking_markers if dast_blocking_markers else 'none'}")

          blocked = False

          if sast_errors:
              print("[security-gate] BLOCKED: Semgrep обнаружил ошибки уровня ERROR.")
              blocked = True

          if sca_critical:
              print("[security-gate] BLOCKED: Trivy обнаружил CRITICAL-уязвимости.")
              blocked = True

          if dast_exit_code != 0:
              print("[security-gate] BLOCKED: DAST-тесты завершились с ошибкой.")
              blocked = True

          if dast_blocking_markers:
              print("[security-gate] BLOCKED: в DAST-отчёте найдены HIGH/CRITICAL-маркеры.")
              blocked = True

          if blocked:
              print("[security-gate] RESULT: BLOCKED")
              sys.exit(1)

          print("[security-gate] RESULT: OK - Security Gate passed")
          PY
